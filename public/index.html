<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Golden.Fors</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050a0f;color:#e0f0ff;font-family:monospace;height:100vh;display:flex;flex-direction:column}
#header{padding:16px;background:#0a1520;border-bottom:1px solid #1a3a5a;display:flex;align-items:center;gap:12px}
#title{color:#ffd700;font-size:20px;font-weight:700}
#sub{color:#555;font-size:10px}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:80%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;white-space:pre-wrap}
.user{align-self:flex-end;background:rgba(0,100,255,.2);border:1px solid rgba(0,150,255,.3)}
.bot{align-self:flex-start;background:rgba(255,180,0,.1);border:1px solid rgba(255,180,0,.3)}
#footer{padding:12px;background:#0a1520;border-top:1px solid #1a3a5a;display:flex;gap:8px}
#inp{flex:1;background:rgba(255,255,255,.05);border:1px solid #1a3a5a;border-radius:8px;padding:10px;color:#e0f0ff;font-family:monospace;font-size:13px;outline:none}
#btn{background:#ffd700;border:none;border-radius:8px;padding:10px 20px;color:#000;font-weight:700;cursor:pointer}
#status{color:#ffd700;font-size:11px;padding:4px 16px}
</style>
</head>
<body>
<div id="header">
<span style="font-size:28px">⚡</span>
<div><div id="title">GOLDEN.FORS</div><div id="sub">AGENT IA AUTONOME</div></div>
</div>
<div id="chat">
<div class="msg bot">🌟 Golden.Fors activé. Bonjour Manager. Que souhaitez-vous accomplir aujourd'hui ?</div>
</div>
<div id="status"></div>
<div id="footer">
<input id="inp" placeholder="Donnez une instruction..." onkeydown="if(event.key==='Enter')send()"/>
<button id="btn" onclick="send()">▶</button>
</div>
<script>
const SYS=`Tu es Golden.Fors, assistant IA et marketeur digital d'élite. Autonomie totale. Spécialisé marché togolais et ouest-africain. Réponds en français.`;
let H=[];
async function send(){
const i=document.getElementById('inp');
const t=i.value.trim();
if(!t)return;
i.value='';
add(t,'user');
H.push({role:'user',content:t});
document.getElementById('status').textContent='Golden.Fors analyse... ⏳';
document.getElementById('btn').disabled=true;
try{
const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,messages:H})});
const d=await r.json();
const rep=d.content?.map(b=>b.text).join('')||'Erreur.';
H.push({role:'assistant',content:rep});
add(rep,'bot');
}catch(e){add('⚠️ Erreur de connexion.','bot');}
document.getElementById('status').textContent='';
document.getElementById('btn').disabled=false;
}
function add(t,c){
const d=document.createElement('div');
d.className='msg '+c;
d.textContent=t;
document.getElementById('chat').appendChild(d);
d.scrollIntoView();
}
</script>
</body>
</html>
